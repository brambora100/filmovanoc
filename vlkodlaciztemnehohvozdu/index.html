<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vlkodlaci z Temného hvozdu</title>
    <style>
        /* Odstranění okrajů a zamezení scrollování */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Iframe roztažený na celou šířku i výšku okna */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://prehrajto.cz/embed/vlkodlaci-z-temneho-hvozdu-cz-dab-2024-mkv/5f6befd6f6ad2058" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
    </iframe>

</body>
</html>
